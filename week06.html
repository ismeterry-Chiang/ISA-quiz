<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA 認證攀樹師 — 第六週練習題</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070f;
    --surface: #0d0d1a;
    --surface2: #111120;
    --border: #1a1a30;
    --text: #ddddf0;
    --muted: #555568;
    --correct: #4ecca3;
    --wrong: #e94560;
    --accent: #4ecca3;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 70% 50% at 90% 10%, rgba(78,204,163,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 5% 90%, rgba(233,69,96,0.04) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  #app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 16px 48px; }

  .back-nav { padding: 14px 0 0; margin-bottom: -8px; animation: fadeDown 0.4s ease both; }
  .back-link { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--muted); text-decoration: none; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); transition: color 0.15s, border-color 0.15s; }
  .back-link:hover { color: var(--text); border-color: var(--accent); }

  header { padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 22px; animation: fadeDown 0.6s ease both; }
  .header-inner { display: flex; justify-content: space-between; align-items: flex-end; }
  .brand { font-size: 13px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
  .title { font-size: clamp(20px, 4vw, 28px); font-weight: 900; line-height: 1.2; }
  .title span { color: var(--accent); }
  .badges { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .week-badge { display: inline-block; background: rgba(78,204,163,0.12); border: 1px solid var(--accent); color: var(--accent); font-size: 13px; padding: 3px 10px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }
  .countdown { display: inline-block; background: rgba(233,69,96,0.15); border: 1px solid #e94560; color: #e94560; font-size: 13px; padding: 3px 10px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .score-box { text-align: right; }
  .score-num { font-family: 'JetBrains Mono', monospace; font-size: 28px; color: var(--accent); font-weight: 700; line-height: 1; }
  .score-num .denom { color: var(--muted); font-weight: 400; }
  .score-label { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .progress-track { height: 3px; background: var(--border); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 28px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .cat-btn { padding: 7px 14px; border-radius: 20px; font-size: 14px; font-family: 'JetBrains Mono', monospace; cursor: pointer; white-space: nowrap; border: 1px solid var(--muted); background: transparent; color: var(--muted); transition: all 0.2s; }

  .question-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .cat-tag { padding: 4px 12px; border-radius: 4px; font-size: 13px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; border: 1px solid currentColor; }
  .q-counter { font-size: 15px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .question-text { font-size: clamp(18px, 3.5vw, 22px); line-height: 1.8; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: #9090a8; text-align: left; font-size: 17px; line-height: 1.65; cursor: pointer; font-family: 'Noto Serif TC', serif; transition: border-color 0.15s, background 0.15s, color 0.15s; display: flex; gap: 10px; align-items: flex-start; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: var(--correct); background: rgba(78,204,163,0.08); color: var(--correct); }
  .option-btn.wrong   { border-color: var(--wrong);   background: rgba(233,69,96,0.08);   color: var(--wrong); }
  .option-btn.dimmed  { color: var(--muted); border-color: var(--border); }
  .option-icon { font-family: 'JetBrains Mono', monospace; font-weight: 700; flex-shrink: 0; margin-top: 2px; }

  .explanation { margin-top: 22px; background: var(--surface2); border-radius: 8px; padding: 18px 20px; border-left: 3px solid var(--correct); animation: fadeUp 0.35s ease both; }
  .explanation.wrong-exp { border-left-color: var(--wrong); }
  .exp-label { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
  .exp-text { font-size: 16px; line-height: 1.9; color: #b0b0c8; }

  .next-btn { margin-top: 20px; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; font-family: 'Noto Serif TC', serif; cursor: pointer; letter-spacing: 0.08em; transition: opacity 0.2s, transform 0.15s; }
  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  #results { display: none; animation: fadeUp 0.5s ease both; }
  .result-score-big { text-align: center; padding: 48px 0 32px; }
  .result-pct { font-family: 'JetBrains Mono', monospace; font-size: clamp(64px,15vw,96px); font-weight: 700; line-height: 1; letter-spacing: -2px; }
  .result-verdict { font-size: 16px; letter-spacing: 0.25em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-top: 12px; }
  .result-sub { color: var(--muted); font-size: 15px; margin-top: 8px; }

  .section-label { font-size: 13px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .cat-score-row { margin-bottom: 14px; }
  .cat-score-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 15px; }
  .cat-score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .cat-score-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.4,0,.2,1); }

  .advice-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 20px; font-size: 15px; line-height: 1.8; }
  .advice-title { color: var(--text); font-size: 16px; margin-bottom: 10px; }

  .final-sprint { background: rgba(78,204,163,0.06); border: 1px solid rgba(78,204,163,0.25); border-radius: 8px; padding: 18px; margin-bottom: 24px; font-size: 15px; line-height: 1.85; color: #9090a8; }
  .final-sprint strong { color: var(--accent); }
  .final-sprint .exam-date { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: #e94560; font-weight: 700; display: block; margin: 8px 0 4px; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .restart-btn { padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; font-family: 'Noto Serif TC', serif; cursor: pointer; background: var(--accent); color: #07070f; transition: opacity 0.2s; }
  .restart-btn:hover { opacity: 0.88; }
  .cat-btns-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .cat-retry-btn { padding: 11px 8px; background: var(--surface); border-radius: 6px; font-size: 15px; cursor: pointer; font-family: 'Noto Serif TC', serif; border: 1px solid; transition: opacity 0.2s; }
  .cat-retry-btn:hover { opacity: 0.75; }
  .home-btn { display: block; text-align: center; padding: 13px; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 16px; text-decoration: none; font-family: 'JetBrains Mono', monospace; transition: color 0.15s, border-color 0.15s; }
  .home-btn:hover { color: var(--text); border-color: var(--accent); }

  footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; line-height: 2.2; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  .question-card { animation: fadeUp 0.3s ease both; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <div class="back-nav">
    <a href="index.html" class="back-link">← 返回首頁</a>
  </div>

  <header>
    <div class="header-inner">
      <div>
        <div class="brand">ISA Certified Tree Climber · 第十五屆</div>
        <div class="title">筆試<span>練習題庫</span></div>
        <div class="badges">
          <span class="week-badge">第六週 · Week 06</span>
          <span class="countdown">距筆試 18 天</span>
        </div>
      </div>
      <div class="score-box">
        <div class="score-num"><span id="score-correct">0</span><span class="denom">/<span id="score-total">0</span></span></div>
        <div class="score-label">正確率 <span id="score-pct">—</span></div>
      </div>
    </div>
  </header>

  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="filter-scroll" id="filter-row"></div>

  <div id="quiz">
    <div class="question-card" id="question-card">
      <div class="question-meta">
        <span class="cat-tag" id="cat-tag"></span>
        <span class="q-counter" id="q-counter"></span>
      </div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options"></div>
      <div id="explanation-box" style="display:none"></div>
      <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
    </div>
  </div>

  <div id="results">
    <div class="result-score-big">
      <div class="result-pct" id="result-pct"></div>
      <div class="result-verdict" id="result-verdict"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div><div class="section-label">各類別成績</div><div id="cat-scores"></div></div>
    <div class="advice-box" id="advice-box"></div>
    <div class="final-sprint">
      <strong>🏁 最後衝刺提醒</strong>
      <span class="exam-date">2026 / 06 / 27（六）</span>
      距考試 18 天。本週做完後，把歷週錯誤最多的類別再重練一輪。<br>
      術科：投擲繩精準度、Blake's hitch 30 秒完成、下降前記得打 <strong>figure-8 終止結</strong>。<br>
      考前一天只做繩結手感確認，不讀新內容。
    </div>
    <div class="result-actions">
      <button class="restart-btn" onclick="restart()">重新練習（全部）</button>
      <div class="cat-btns-grid" id="cat-btns-grid"></div>
      <a href="index.html" class="home-btn">← 返回首頁</a>
    </div>
  </div>

  <footer>
    <div>ISA 攀樹師筆試練習 · 最後衝刺 · 距考試 18 天</div>
    <div><a href="https://github.com/ismeterry-chiang/ISA-quiz" target="_blank">github.com/ismeterry-chiang/ISA-quiz</a></div>
    <div><a href="index.html">← 返回首頁</a></div>
  </footer>
</div>

<script>
const COLORS = {
  "安全":           { accent:"#e94560", light:"rgba(233,69,96,0.12)"   },
  "樹木移除":       { accent:"#f5a623", light:"rgba(245,166,35,0.12)"  },
  "攀爬與索具":     { accent:"#4ecca3", light:"rgba(78,204,163,0.12)"  },
  "修剪":           { accent:"#a78bfa", light:"rgba(167,139,250,0.12)" },
  "樹木健康與辨識": { accent:"#34d399", light:"rgba(52,211,153,0.12)"  },
};
const WEIGHTS = { "安全":"26%","樹木移除":"22%","攀爬與索具":"22%","修剪":"20%","樹木健康與辨識":"10%" };
const CATEGORIES = ["全部","安全","樹木移除","攀爬與索具","修剪","樹木健康與辨識"];

const ALL_QUESTIONS = [

  // ══════════════ 安全 (7題) ══════════════
  {
    cat:"安全",
    q:"ISA 術科評分表中，「KNOTS & HITCHES（各類繩結）」的 FAIL 判定標準是什麼？",
    opts:[
      "A. 六個繩結中只要有一個錯誤即 FAIL",
      "B. 六個繩結中錯誤三個（含）以上即 FAIL，每個繩結限時一分鐘，遞到考官手中才算完成",
      "C. 繩結完成時間超過三分鐘才 FAIL，數量不限",
      "D. 六個繩結全部錯誤才 FAIL，部分錯誤只扣分"
    ],
    ans:1,
    exp:"評分表原文：「NOTE — MISS 3 KNOTS = FAIL」。六種繩結類型各示範一個，每個繩結必須在首次遞給考官時即正確完成（first attempt），且必須正確 dress（整理）和 set（定型）。時間限制是每個繩結一分鐘，從開始到遞給考官。錯三個及以上直接 FAIL，錯一或兩個只扣分（各一分）。六類繩結：連結裝備、終端繩結、溜纜繩尾繩結、溜纜繩連接繩結、繩中段繩結、攀樹摩擦結。"
  },
  {
    cat:"安全",
    q:"術科考試中「不受控制的擺盪（uncontrolled pendulum swing）」被警告後，第二次違規的後果是？",
    opts:[
      "A. 扣減三分但可繼續考試",
      "B. 該站項目評為不滿意，須重做一次",
      "C. 在考試任何時刻發生第二次，即直接 FAIL 整個考試",
      "D. 考官會口頭提醒，不影響成績"
    ],
    ans:2,
    exp:"ISA 評分表在 Section F（手鋸工作站）明確說明：「固定點需設置在能令攀爬者使用合適的繩索系統角度的位置，及不會出現不受控制的擺盪。在第一次警告後，於考試中任何時刻如有第二次違規，將導致考試無法通過。」同樣規則也適用於 fall 超過 3 英尺（0.91公尺）的情況。兩種違規都是「第一次警告、第二次 FAIL」的機制，需要特別注意。"
  },
  {
    cat:"安全",
    q:"關於「攀爬效率（Efficient Climb）」的評分，以下何者正確？",
    opts:[
      "A. 30分鐘內完成得滿分，31分鐘以上直接 FAIL",
      "B. 30分鐘內完成得3分；超過30分鐘扣3分；超過45分鐘則整體 FAIL 且必須立即下降",
      "C. 效率項目只有時間記錄，不影響分數",
      "D. 45分鐘內完成得滿分，超過才扣分"
    ],
    ans:1,
    exp:"Section H 的 Efficient Climb 評分規則（評分表原文）：「下降及整體攀爬必須在開始時間後30分鐘內完成，才能獲得此項目的所有分數；若未在30分鐘內完成，扣3分。若在45分鐘內未完成攀爬，則未通過考核，攀爬者必須以安全速度下降並返回地面，且不得損壞攀樹繩。」計時從第一次拋繩（Climbing Line Installation）開始。策略建議：目標25分鐘內完成，留5分鐘緩衝。"
  },
  {
    cat:"安全",
    q:"術科「Pre-climb Tree & Site Inspection（攀爬前樹木和現場評估）」共有幾分，哪個項目配分最高？",
    opts:[
      "A. 共4分，四項各1分",
      "B. 共6分，電力系統評估佔2分、結構缺陷評估佔2分、遠近目視佔1分、行人車輛評估佔1分",
      "C. 共3分，只評估電力線和結構",
      "D. 此項目不計分，只作為資格確認"
    ],
    ans:1,
    exp:"Section B（Rope Installation）中的 Pre-climb Tree & Site Inspection 分配：(1) 遠近目視根系、樹幹、枝條——1分，(2) 評估電力系統及安全距離——2分（最高），(3) 評估行人/車輛通行並計畫安全距離——1分，(4) 辨識結構缺陷和潛在危害（形狀、傾斜、裂縫、分裂、過重）——2分（最高）。共6分。電力系統和結構缺陷各佔2分，是這個區段的重點，口述時需要具體說明觀察到的內容，不能只說「沒問題」。"
  },
  {
    cat:"安全",
    q:"術科「Aerial Tree Inspection（高空樹木檢查）」在哪個時機進行，共幾分？",
    opts:[
      "A. 攀爬前在地面進行，共2分",
      "B. 到達第一個或最高（SRS 情況）固定點時進行，共3分（結構缺陷1分＋固定點完整性評估2分）",
      "C. 在最高固定點完成後進行，共4分",
      "D. 下降前進行，作為最後安全確認，共2分"
    ],
    ans:1,
    exp:"Section D（Rope Advancement）的 Aerial Tree Inspection：到達第一個固定點（MRS）或最高固定點（SRS）時進行。配分：(1) 辨識結構缺陷和潛在危害（枯枝、傾斜、裂縫、分裂、過重、野生動物）——1分，(2) 目視評估固定點結構完整性（針對預期受力使用的錨點評估強度減弱跡象）——2分。共3分。高空評估與地面評估的差異：在高處可以看到地面看不到的枝條附著狀況、樹皮隆起、腐朽等細節，是固定點安全評估的關鍵環節。"
  },
  {
    cat:"安全",
    q:"術科評分表的「TOTAL POINTS POSSIBLE（可能的總得分）」是幾分，及格分數通常是幾分？",
    opts:[
      "A. 總分50分，及格35分",
      "B. 總分38分，通過標準依各國/地區規定，通常需達到特定百分比",
      "C. 總分100分，及格70分",
      "D. 總分30分，全數通過才算及格"
    ],
    ans:1,
    exp:"ISA 術科評分表最後一頁明確標示：「TOTAL POINTS POSSIBLE 可能的總得分 = 38」。各部分分佈：Section A（Pre-climb）含繩結共9分左右，Section B（Rope Installation）7分，Section C（Secured Entry）1分，Section D（Rope Advancement）4分，Section E（Tie-in）4分，Section F（Handsaw）3分，Section G（Pole Saw）4分，Section H（Descent）6分。通過標準依各地區規定，且有9個強制 FAIL 點，無論總分多高，FAIL 任一強制點即無法通過。"
  },
  {
    cat:"安全",
    q:"術科「On Rope Test at Final Tie-in（最高固定點的繩上固定測試）」的要求是什麼？",
    opts:[
      "A. 雙腳離地，單手可以扶繩",
      "B. 必須在維持兩點接觸（two points of attachment）的同時，示範繩上固定測試；若不合格不得繼續",
      "C. 只需口頭向考官說明系統已固定即可",
      "D. 此測試只在地面做一次，高空不需要重複"

    exp:"Crown restoration（樹冠恢復）的應用情境：截頂或嚴重損傷後的樹木，已產生大量結構弱的徒長枝。恢復步驟：(1) 評估哪些徒長枝位置和方向最有潛力成為永久性枝條，(2) 選留1–2條最有潛力的並保留其生長優勢，(3) 逐步移除其餘競爭枝（分多次，每次不超過25%），(4) 隨著選留枝逐漸木質化、附著強度提高，繼續引導結構。這是一個需要3–5年多次作業的長期工程，不是一次能完成的，需要在每次作業的修剪規範中明確說明。"
  },

  // ══════════════ 樹木健康與辨識 (3題) ══════════════
  {
    cat:"樹木健康與辨識",
    q:"「白粉病（powdery mildew）」與「煤煙病（sooty mold）」的主要區別和各自的診斷意義是？",
    opts:[
      "A. 兩者都是真菌病害，對樹木危害相同，處理方式也相同",
      "B. 白粉病是直接感染葉片的病原真菌；煤煙病是生長在蚜蟲等刺吸害蟲排泄的蜜露上，本身不直接危害植物，但間接指示有吸汁害蟲存在",
      "C. 白粉病只發生在潮濕環境，煤煙病只在乾燥環境出現",
      "D. 兩者都可以用同一種殺菌劑有效處理"
    ],
    ans:1,
    exp:"白粉病（Powdery mildew）：病原真菌直接侵染葉片表面，白色粉狀菌絲可見，在相對濕度中等但溫度較高的條件下發病，影響光合作用，嚴重時導致葉片扭曲。煤煙病（Sooty mold）：本身不感染植物組織，而是生長在蚜蟲、介殼蟲、粉蝨等刺吸害蟲排泄的「蜜露」上，出現煤煙病→強烈指示上方或當前有大量吸汁害蟲，需要找出害蟲並處理，而非針對煤煙病本身噴藥。診斷時要「追溯根源」，不能只處理症狀。"
  },
  {
    cat:"樹木健康與辨識",
    q:"「樹木年輪（tree rings / growth rings）」在樹木健康診斷中的應用是？",
    opts:[
      "A. 年輪只能用來計算樹齡，無法提供其他資訊",
      "B. 年輪寬度反映各年的生長速度，窄年輪指示壓力年（乾旱、病蟲害、根系損傷等），可追溯歷史壓力事件的時間和持續時間",
      "C. 年輪只在針葉樹中形成，闊葉樹沒有年輪",
      "D. 年輪寬度只反映降雨量，與其他因素無關"
    ],
    ans:1,
    exp:"年輪分析（dendrochronology）在樹木診斷中的應用：每個年輪由春材（earlywood，細胞大、顏色淡）和秋材（latewood，細胞小、顏色深）組成，共同代表一年的生長。窄年輪→該年生長受限，可能原因：乾旱年、病蟲害爆發年、大量修剪年、施工根系損傷年。透過查閱歷史紀錄（施工日期、病蟲害記錄），可將壓力事件與年輪對應，確認因果關係。這對訴訟案件中證明施工損害樹木特別有用。在活樹上可使用生長錐（increment borer）取樣而不需要伐倒。"
  },
  {
    cat:"樹木健康與辨識",
    q:"「台灣常見行道樹——黑板樹（Alstonia scholaris）」的主要結構風險特徵是？",
    opts:[
      "A. 根系過深，影響地下管線",
      "B. 輪生枝（whorled branching）的附著點天生較弱，颱風時大型枝條連同樹皮撕裂脫落風險高；且快速生長使木材較脆",
      "C. 黑板樹完全沒有結構風險，是非常安全的行道樹",
      "D. 只有老齡樹（50年以上）才有結構風險"
    ],
    ans:1,
    exp:"黑板樹（象耳木）作為行道樹的結構風險：(1) 輪生枝特性——多條枝條從同一節點輻射生長，各枝條間的附著角度相似，容易形成競爭，連結點天生不如互生枝強壯；(2) 快速生長——年生長量大，但快速生長的木材密度較低，在風力下承受撞擊的韌性較弱；(3) 大型枝條——成熟個體主枝可達相當粗徑，台灣颱風季節風速極大，大型枝條整條脫落是常見的颱風損傷；(4) 攀爬注意：進行黑板樹作業時，固定點選擇需特別評估輪生枝的附著強度，優先選擇直接固定在主幹的位置。"
  },
];

// ── State ──
let filteredQ = [...ALL_QUESTIONS];
let currentIdx = 0, answered = false, correct = 0, total = 0;
let catScores = {}, selectedCat = "全部";

buildFilters();
renderQuestion();

function buildFilters() {
  const row = document.getElementById("filter-row");
  row.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === selectedCat ? " active" : "");
    const c = COLORS[cat] || {};
    if (cat === selectedCat && cat !== "全部") {
      btn.style.background = c.accent; btn.style.color = "#07070f"; btn.style.borderColor = c.accent;
    } else if (cat !== "全部") {
      btn.style.color = c.accent; btn.style.borderColor = c.accent;
    } else if (cat === selectedCat) {
      btn.style.background = "#4ecca3"; btn.style.color = "#07070f"; btn.style.borderColor = "#4ecca3";
    }
    btn.textContent = cat === "全部" ? "全部" : `${cat} ${WEIGHTS[cat]}`;
    btn.onclick = () => switchCategory(cat);
    row.appendChild(btn);
  });
}

function switchCategory(cat) {
  selectedCat = cat;
  filteredQ = cat === "全部" ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.cat === cat);
  currentIdx = 0; answered = false; correct = 0; total = 0; catScores = {};
  document.getElementById("quiz").style.display = "block";
  document.getElementById("results").style.display = "none";
  updateScore(); buildFilters(); renderQuestion();
}

function renderQuestion() {
  const q = filteredQ[currentIdx];
  const c = COLORS[q.cat];
  document.getElementById("progress-fill").style.width = ((currentIdx + (answered ? 1 : 0)) / filteredQ.length * 100) + "%";
  document.getElementById("progress-fill").style.background = c.accent;
  const tag = document.getElementById("cat-tag");
  tag.textContent = q.cat; tag.style.color = c.accent; tag.style.borderColor = c.accent; tag.style.background = c.light;
  document.getElementById("q-counter").textContent = `${currentIdx + 1} / ${filteredQ.length}`;
  document.getElementById("question-text").textContent = q.q;
  const opts = document.getElementById("options");
  opts.innerHTML = "";
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn"; btn.textContent = opt; btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });
  document.getElementById("explanation-box").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
  const card = document.getElementById("question-card");
  card.style.animation = "none";
  requestAnimationFrame(() => { card.style.animation = "fadeUp 0.3s ease both"; });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = filteredQ[currentIdx];
  const c = COLORS[q.cat];
  const isCorrect = idx === q.ans;
  if (isCorrect) correct++;
  total++;
  if (!catScores[q.cat]) catScores[q.cat] = { correct: 0, total: 0 };
  catScores[q.cat].total++;
  if (isCorrect) catScores[q.cat].correct++;
  document.querySelectorAll(".option-btn").forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) { btn.className = "option-btn correct"; btn.innerHTML = `<span class="option-icon">✓</span><span>${q.opts[i]}</span>`; }
    else if (i === idx && !isCorrect) { btn.className = "option-btn wrong"; btn.innerHTML = `<span class="option-icon">✗</span><span>${q.opts[i]}</span>`; }
    else btn.className = "option-btn dimmed";
  });
  const exp = document.getElementById("explanation-box");
  exp.style.display = "block";
  exp.className = isCorrect ? "explanation" : "explanation wrong-exp";
  exp.innerHTML = `<div class="exp-label" style="color:${isCorrect ? "var(--correct)" : "var(--wrong)"}">${isCorrect ? "✓ 正確" : "✗ 解析"}</div><div class="exp-text">${q.exp}</div>`;
  const nb = document.getElementById("next-btn");
  nb.style.display = "block"; nb.style.background = c.accent;
  nb.style.color = (q.cat === "安全") ? "#fff" : "#07070f";
  nb.textContent = currentIdx < filteredQ.length - 1 ? "下一題 →" : "查看成績 →";
  updateScore();
  document.getElementById("progress-fill").style.width = ((currentIdx + 1) / filteredQ.length * 100) + "%";
}

function nextQuestion() {
  if (currentIdx < filteredQ.length - 1) { currentIdx++; answered = false; renderQuestion(); }
  else showResults();
}

function updateScore() {
  document.getElementById("score-correct").textContent = correct;
  document.getElementById("score-total").textContent = total;
  document.getElementById("score-pct").textContent = total > 0 ? Math.round(correct / total * 100) + "%" : "—";
}

function showResults() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("results").style.display = "block";
  const pct = Math.round(correct / total * 100), passed = pct >= 70;
  const pe = document.getElementById("result-pct");
  pe.textContent = pct + "%"; pe.style.color = passed ? "var(--correct)" : "var(--wrong)";
  const ve = document.getElementById("result-verdict");
  ve.textContent = passed ? "✓ 通過標準" : "✗ 繼續加強"; ve.style.color = pe.style.color;
  document.getElementById("result-sub").textContent = `${correct} / ${total} 題正確`;
  const cs = document.getElementById("cat-scores");
  cs.innerHTML = "";
  Object.entries(catScores).forEach(([cat, s]) => {
    const p = Math.round(s.correct / s.total * 100), color = COLORS[cat].accent;
    cs.innerHTML += `<div class="cat-score-row"><div class="cat-score-header"><span style="color:${color}">${cat} <span style="color:var(--muted);font-size:13px">(${WEIGHTS[cat]})</span></span><span style="font-family:'JetBrains Mono',monospace">${s.correct}/${s.total} — ${p}%</span></div><div class="cat-score-bar"><div class="cat-score-fill" style="width:${p}%;background:${color}"></div></div></div>`;
  });
  const adv = document.getElementById("advice-box");
  const weak = Object.entries(catScores).filter(([, s]) => Math.round(s.correct / s.total * 100) < 70);
  adv.innerHTML = `<div class="advice-title">💡 衝刺建議</div>`;
  if (weak.length === 0) {
    adv.innerHTML += `<div style="color:var(--correct)">✓ 全部類別達 70% 以上！18 天後就是正式考試，你準備好了。</div>`;
  } else {
    weak.forEach(([cat, s]) => {
      const p = Math.round(s.correct / s.total * 100);
      adv.innerHTML += `<div style="color:var(--wrong);margin-bottom:6px">⚠ ${cat}：${p}% — 還有 18 天，這週重點補強這個類別</div>`;
    });
  }
  const grid = document.getElementById("cat-btns-grid");
  grid.innerHTML = "";
  Object.keys(catScores).forEach(cat => {
    const color = COLORS[cat].accent;
    const btn = document.createElement("button");
    btn.className = "cat-retry-btn"; btn.style.color = color; btn.style.borderColor = color;
    btn.textContent = `重練 ${cat}`; btn.onclick = () => switchCategory(cat);
    grid.appendChild(btn);
  });
}
function restart() { switchCategory("全部"); }
</script>
</body>
</html>
